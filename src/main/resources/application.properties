# 基础配置
# 先加载 .env（支持在项目根目录或 target/quarkus-app 目录启动），再加载数据库/日志/监听处理分组配置。
# 允许通过 WAREHOUSE_CONFIG_LOCATIONS 覆盖整个配置源列表。
quarkus.config.locations=${WAREHOUSE_CONFIG_LOCATIONS:.env,../.env,../../.env,database.properties,logger.properties,watch-processing.properties}

# 避免 dev 模式下持续测试占用固定测试端口导致冲突。
quarkus.http.test-port=0

# OpenAI 密钥：建议通过环境变量注入
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
# 模型（示例用 gpt-4o；你也可以换成你账号可用的模型名）
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
