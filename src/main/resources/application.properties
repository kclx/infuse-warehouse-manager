# Base config
# Load .env first, then datasource/ORM settings from a dedicated file.
quarkus.config.locations=.env,database.properties,logger.properties,watch-whitelist.properties,watch-db-whitelist.properties
# Avoid dev/test port conflicts when running continuous testing in dev mode.
quarkus.http.test-port=0
# OpenAI Key：建议用环境变量注入
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
# 模型（示例用 gpt-4o；你也可以换成你账号可用的模型名）
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
# 监听文件夹
watch.path=/Users/orlando/Documents/Program/warehouse-manager/data
# 目标文件夹（处理后文件将移动到该目录下的 name 子目录）
watch.target-path=/Users/orlando/Documents/Program/warehouse-manager/data/data-target
# 输出命名模板
watch.filename.pattern={name}_SP{snumber}EP{enumber}.{ext}
# 季号位数（示例：1 -> s1，2 -> s01，3 -> s001）
watch.filename.season-number-width=1
# 集号位数（示例：1 -> e7，2 -> e07，3 -> e007）
watch.filename.episode-number-width=1